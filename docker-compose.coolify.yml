x-app-env: &app-env
  DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?set DJANGO_SECRET_KEY}
  DJANGO_DEBUG: ${DJANGO_DEBUG:-false}
  DJANGO_LOG_LEVEL: ${DJANGO_LOG_LEVEL:-INFO}
  DJANGO_SECURE_SSL_REDIRECT: ${DJANGO_SECURE_SSL_REDIRECT:-true}
  DJANGO_SESSION_COOKIE_SECURE: ${DJANGO_SESSION_COOKIE_SECURE:-true}
  DJANGO_CSRF_COOKIE_SECURE: ${DJANGO_CSRF_COOKIE_SECURE:-true}

  ALLOWED_HOSTS: ${ALLOWED_HOSTS:?set ALLOWED_HOSTS}
  CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:?set CSRF_TRUSTED_ORIGINS}

  DATABASE_URL: postgres://${POSTGRES_USER:-ticketmirror}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ticketmirror}

  GUNICORN_WORKERS: ${GUNICORN_WORKERS:-3}
  GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-60}

  DJANGO_SUPERUSER_USERNAME: ${DJANGO_SUPERUSER_USERNAME:-}
  DJANGO_SUPERUSER_EMAIL: ${DJANGO_SUPERUSER_EMAIL:-}
  DJANGO_SUPERUSER_PASSWORD: ${DJANGO_SUPERUSER_PASSWORD:-}

  GMAIL_MAILBOX: ${GMAIL_MAILBOX:-}
  GMAIL_CLIENT_ID: ${GMAIL_CLIENT_ID:-}
  GMAIL_CLIENT_SECRET: ${GMAIL_CLIENT_SECRET:-}
  GMAIL_REFRESH_TOKEN: ${GMAIL_REFRESH_TOKEN:-}

services:
  web:
    build:
      context: .
    command: >
      sh -ex -c "
      echo '--- running django check ---' &&
      python manage.py check &&
      echo '--- running migrations ---' &&
      python manage.py migrate --noinput &&
      echo '--- seeding Bookeo catalog ---' &&
      python manage.py seed_bookeo_products &&
      echo '--- replaying OTA raw email backlog ---' &&
      python manage.py replay_raw_emails --apply --include-parsed
      --provider klook --provider tripster --provider sputnik8 --provider alle &&
      echo '--- replaying Cyrillic raw email backlog ---' &&
      python manage.py replay_raw_emails --apply --include-parsed
      --contains-cyrillic &&
      echo '--- repairing parsed booking display fields ---' &&
      python manage.py repair_parsed_booking_display_fields --quiet --limit 500 &&
      echo '--- re-slotting bookings ---' &&
      (python manage.py reslot_bookings --quiet || true) &&
      echo '--- resolving stale booking reviews ---' &&
      (python manage.py resolve_stale_booking_reviews --quiet --limit 500 || true) &&
      echo '--- running collectstatic ---' &&
      python manage.py collectstatic --noinput &&
      echo '--- creating initial admin ---' &&
      python manage.py create_initial_admin &&
      echo '--- starting gunicorn ---' &&
      exec gunicorn config.wsgi:application
      --bind 0.0.0.0:8000
      --workers $${GUNICORN_WORKERS:-3}
      --timeout $${GUNICORN_TIMEOUT:-60}
      --access-logfile -
      --error-logfile -
      "
    environment: *app-env
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - static_data:/app/staticfiles
      - media_data:/app/media
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/healthz/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  poller:
    build:
      context: .
    command: python manage.py poll_gmail --loop --interval 60
    environment: *app-env
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    volumes:
      - media_data:/app/media

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ticketmirror}
      POSTGRES_USER: ${POSTGRES_USER:-ticketmirror}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  postgres_data:
  static_data:
  media_data:
