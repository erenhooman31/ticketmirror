x-app-env: &app-env
  DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?set DJANGO_SECRET_KEY}
  DJANGO_DEBUG: ${DJANGO_DEBUG:-false}
  DJANGO_LOG_LEVEL: ${DJANGO_LOG_LEVEL:-INFO}
  DJANGO_SECURE_SSL_REDIRECT: ${DJANGO_SECURE_SSL_REDIRECT:-true}
  DJANGO_SESSION_COOKIE_SECURE: ${DJANGO_SESSION_COOKIE_SECURE:-true}
  DJANGO_CSRF_COOKIE_SECURE: ${DJANGO_CSRF_COOKIE_SECURE:-true}

  ALLOWED_HOSTS: ${ALLOWED_HOSTS:?set ALLOWED_HOSTS}
  CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:?set CSRF_TRUSTED_ORIGINS}

  DATABASE_URL: postgres://${POSTGRES_USER:-ticketmirror}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ticketmirror}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
  CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}

  GUNICORN_WORKERS: ${GUNICORN_WORKERS:-3}
  GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-60}

  DJANGO_SUPERUSER_USERNAME: ${DJANGO_SUPERUSER_USERNAME:-}
  DJANGO_SUPERUSER_EMAIL: ${DJANGO_SUPERUSER_EMAIL:-}
  DJANGO_SUPERUSER_PASSWORD: ${DJANGO_SUPERUSER_PASSWORD:-}

  GMAIL_MAILBOX: ${GMAIL_MAILBOX:-}
  GMAIL_CLIENT_ID: ${GMAIL_CLIENT_ID:-}
  GMAIL_CLIENT_SECRET: ${GMAIL_CLIENT_SECRET:-}
  GMAIL_REFRESH_TOKEN: ${GMAIL_REFRESH_TOKEN:-}
  GMAIL_PUBSUB_TOPIC: ${GMAIL_PUBSUB_TOPIC:-}
  GMAIL_WEBHOOK_AUDIENCE: ${GMAIL_WEBHOOK_AUDIENCE:-}
  GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT:-}

services:
  web:
    build:
      context: .
    command: >
      sh -ex -c "
      echo '--- running django check ---' &&
      python manage.py check &&
      echo '--- running migrations ---' &&
      python manage.py migrate --noinput &&
      echo '--- running collectstatic ---' &&
      python manage.py collectstatic --noinput &&
      echo '--- creating initial admin ---' &&
      python manage.py create_initial_admin &&
      echo '--- starting gunicorn ---' &&
      exec gunicorn config.wsgi:application
      --bind 0.0.0.0:8000
      --workers $${GUNICORN_WORKERS:-3}
      --timeout $${GUNICORN_TIMEOUT:-60}
      --access-logfile -
      --error-logfile -
      "
    environment: *app-env
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - static_data:/app/staticfiles
      - media_data:/app/media
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/healthz/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  worker:
    build:
      context: .
    command: celery -A config worker -l info
    environment: *app-env
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    volumes:
      - media_data:/app/media

  beat:
    build:
      context: .
    command: celery -A config beat -l info --schedule=/tmp/celerybeat-schedule
    environment: *app-env
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    volumes:
      - media_data:/app/media

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ticketmirror}
      POSTGRES_USER: ${POSTGRES_USER:-ticketmirror}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    environment:
      SERVICE_URL_CADDY: ${SERVICE_URL_CADDY:?set SERVICE_URL_CADDY}
    depends_on:
      web:
        condition: service_healthy
    expose:
      - "80"
    volumes:
      - static_data:/srv/static:ro
      - media_data:/srv/media:ro
    command: |
      cat > /etc/caddy/Caddyfile <<'EOF'
      :80 {
        encode gzip zstd

        handle_path /static/* {
          root * /srv/static
          file_server
        }

        handle_path /media/* {
          root * /srv/media
          file_server
          header Content-Disposition "attachment"
        }

        reverse_proxy web:8000 {
          header_up Host {host}
          header_up X-Forwarded-Proto https
          header_up X-Forwarded-Host {host}
          header_up X-Real-IP {remote_host}
        }

        header {
          X-Content-Type-Options nosniff
          Referrer-Policy same-origin
        }
      }
      EOF
      exec caddy run --config /etc/caddy/Caddyfile --adapter caddyfile

volumes:
  postgres_data:
  redis_data:
  static_data:
  media_data:
