services:
  web:
    build:
      context: .
      args:
        INSTALL_TRANSLATION_MODELS: ${INSTALL_TRANSLATION_MODELS:-false}
    command: python manage.py runserver 0.0.0.0:8000
    env_file:
      - .env
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  poller:
    build:
      context: .
      args:
        INSTALL_TRANSLATION_MODELS: ${INSTALL_TRANSLATION_MODELS:-false}
    command: python manage.py poll_gmail --loop --interval 60
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ticketmirror}
      POSTGRES_USER: ${POSTGRES_USER:-ticketmirror}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ticketmirror}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  postgres_data:
